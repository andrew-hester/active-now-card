<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Home Dashboard Card — demo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#0b0e16}
  .view{max-width:1180px;margin:0 auto;padding:12px}
</style>
</head><body>
  <div class="view"><home-dashboard-card id="card"></home-dashboard-card></div>
<script type="module">
import '../dist/home-dashboard-card.js';

const states={}, entities={}, devices={dev_office:{id:'dev_office',area_id:'office'}};
const areas={
  master_bedroom:{area_id:'master_bedroom',name:'Master Bedroom'},
  living_room:{area_id:'living_room',name:'Living Room'},
  kitchen:{area_id:'kitchen',name:'Kitchen'},
  office:{area_id:'office',name:'Office'},
  guest_room:{area_id:'guest_room',name:'Guest Room'},
  flynn_room:{area_id:'flynn_room',name:"Flynn's Room"},
};
const L=(id,name,area,bri)=>{states[id]={entity_id:id,state:'on',attributes:{friendly_name:name,brightness:bri}};entities[id]=id==='light.office_desk'?{area_id:null,device_id:'dev_office'}:{area_id:area};};
L('light.master_cans','Master Cans','master_bedroom',180);
L('light.master_chandelier','Chandelier','master_bedroom',92);
L('light.master_lamp','Nightstand Lamp','master_bedroom',255);
L('light.lr_lamp','Living Room Lamp','living_room',200);
L('light.lr_cans','Cans','living_room',255);
L('light.lr_accent','Accent Strip','living_room',60);
L('light.kitchen_cans','Kitchen Cans','kitchen',255);
L('light.kitchen_island','Island Pendants','kitchen',220);
L('light.office_desk','Desk Lamp',null,255);
const F=(id,name,area)=>{states[id]={entity_id:id,state:'on',attributes:{friendly_name:name,percentage:66}};entities[id]={area_id:area};};
F('fan.office','Office Fan','office');F('fan.guest','Guest Ceiling Fan','guest_room');
const B=(id,name,dc,pos)=>{states[id]={entity_id:id,state:'open',attributes:{friendly_name:name,device_class:dc,current_position:pos}};entities[id]={area_id:null};};
['Back Right Blind','Back Left Blind','Right Curtain','Left Curtain','Living Room Shade 1','Kitchen Window','Office Blind','Master Blackout',"Flynn's Blind","Stair Window","Hallway Shade"].forEach((n,i)=>B('cover.blind'+i,n,['blind','curtain','shade','window'][i%4],100));
states['cover.lan_garage']={entity_id:'cover.lan_garage',state:'closed',attributes:{friendly_name:'Garage Door',device_class:'garage',current_position:0}};entities['cover.lan_garage']={area_id:null};
// climate
const C=(id,name,area,cur,tgt,state)=>{states[id]={entity_id:id,state:state,attributes:{friendly_name:name,current_temperature:cur,temperature:tgt,hvac_action:'idle'}};entities[id]={area_id:area};};
C('climate.living','Living Room','living_room',72,72,'heat');
C('climate.master','Master Bedroom','master_bedroom',69,70,'heat');
C('climate.kids',"Kids' Wing",'flynn_room',71,70,'heat');
// locks
const LK=(id,name,state)=>{states[id]={entity_id:id,state:state,attributes:{friendly_name:name}};entities[id]={area_id:null};};
LK('lock.front','Front Door','locked');LK('lock.back','Back Door','locked');LK('lock.garage_entry','Garage Entry','locked');
// media
const M=(id,name,area,state,title,artist)=>{states[id]={entity_id:id,state:state,attributes:{friendly_name:name,media_title:title,media_artist:artist}};entities[id]={area_id:area};};
M('media_player.lr_tv','Living Room TV','living_room','playing','The Bear · S3E4','');
M('media_player.office_pod','Office HomePod','office','playing','Kerala','Bonobo');
M('media_player.kitchen','Kitchen Display','kitchen','idle','','');
M('media_player.master_tv','Master Bedroom TV','master_bedroom','off','','');
// scenes
['Movie Night','Dinner','Bedtime','Good Morning','Away','Focus','Relax','All Off'].forEach((n,i)=>{const id='scene.s'+i;states[id]={entity_id:id,state:'',attributes:{friendly_name:n}};entities[id]={area_id:null};});

function makeHass(){
  return {states,entities,devices,areas,
    config:{unit_system:{temperature:'°F'}},
    callService(domain,service,data){
      const ids=Array.isArray(data.entity_id)?data.entity_id:[data.entity_id];
      setTimeout(()=>{
        for(const id of ids){const e=states[id];if(!e)continue;
          if(service==='turn_off')e.state='off';
          if(service==='close_cover'){e.state='closed';if(e.attributes.current_position!=null)e.attributes.current_position=0;}
          if(service==='lock')e.state='locked';
          if(service==='unlock')e.state='unlocked';
          if(service==='media_play_pause')e.state=e.state==='playing'?'paused':'playing';
          if(service==='set_temperature')e.attributes.temperature=data.temperature;
        }
        push();
      },280);
      return Promise.resolve();
    }};
}
const card=document.getElementById('card');
card.setConfig({type:'custom:home-dashboard-card',name:'Andrew',categories:['active','climate','security','media','scenes','rooms'],show_brightness:true});
function push(){card.hass=makeHass();}
push();
window.__card=card;
</script>
</body></html>
